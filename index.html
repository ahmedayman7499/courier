<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>WC — بوابة المناديب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14;--bg2:#131720;--bg3:#1a1f2e;--bg4:#222840;
  --border:#2a3045;--border2:#353d5a;
  --mist:#5a6480;--silver:#8892a8;--pearl:#b8c0d4;--ivory:#dde3f0;--white:#f0f4ff;
  --gold:#e8b84b;--gold2:#c9960f;--gold-faint:rgba(232,184,75,.10);
  --blue:#4a9eff;--blue2:#2563eb;--blue-faint:rgba(74,158,255,.10);
  --green:#34d399;--green-faint:rgba(52,211,153,.10);
  --red:#f87171;--red-faint:rgba(248,113,113,.10);
  --amber:#fbbf24;--amber-faint:rgba(251,191,36,.10);
  --purple:#a78bfa;
  --r1:6px;--r2:12px;--r3:20px;--r4:999px;
  --sh1:0 4px 24px rgba(0,0,0,.4);--sh2:0 12px 48px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;scroll-behavior:smooth;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--ivory);min-height:100vh;overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(74,158,255,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(167,139,250,.05) 0%,transparent 60%);}
.page{position:relative;z-index:1;min-height:100vh;display:none;}
.page.active{display:flex;}

/* LOGIN */
#loginPage{align-items:center;justify-content:center;padding:20px;}
.login-wrap{width:100%;max-width:400px;animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-brand{text-align:center;margin-bottom:36px;}
.login-logo{width:68px;height:68px;border-radius:50%;background:linear-gradient(145deg,var(--bg3),var(--bg4));border:1px solid var(--border2);display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--gold);letter-spacing:2px;box-shadow:0 0 40px rgba(232,184,75,.15);margin-bottom:18px;}
.login-title{font-size:26px;font-weight:800;color:var(--white);margin-bottom:5px;}
.login-sub{font-size:12px;color:var(--mist);}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:30px;box-shadow:var(--sh2);position:relative;overflow:hidden;}
.login-card::before{content:"";position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(232,184,75,.4),transparent);}
.field{margin-bottom:16px;}
.field-label{font-size:10px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:2px;display:block;margin-bottom:7px;}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px 15px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:500;color:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;}
.field-input::placeholder{color:var(--mist);}
.field-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,158,255,.12);}
.btn-login{width:100%;padding:14px;margin-top:6px;background:linear-gradient(135deg,var(--blue2),var(--blue));border:none;border-radius:var(--r2);font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(74,158,255,.3);}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(74,158,255,.4);}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.login-err{margin-top:12px;padding:11px 15px;background:var(--red-faint);border:1px solid rgba(248,113,113,.2);border-radius:var(--r1);font-size:13px;color:var(--red);display:none;text-align:center;}
.login-err.show{display:block;animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* NAV */
#dashPage{flex-direction:column;}
.dash-nav{position:sticky;top:0;z-index:100;background:rgba(12,15,20,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;}
.dash-nav-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:12px 0;}
.nav-brand{font-size:17px;font-weight:900;color:var(--gold);letter-spacing:1px;flex-shrink:0;}
.nav-badge{display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:var(--r4);background:var(--blue-faint);border:1px solid rgba(74,158,255,.2);font-size:12px;font-weight:700;color:var(--blue);}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-gps{font-size:11px;color:var(--mist);margin-inline-start:auto;display:flex;align-items:center;gap:6px;}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--mist);}
.gps-dot.active{background:var(--green);box-shadow:0 0 6px var(--green);}
.nav-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mist);}
.btn-logout{padding:6px 12px;border-radius:var(--r4);background:transparent;border:1px solid var(--border);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;color:var(--mist);cursor:pointer;transition:all .15s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.btn-eod{padding:6px 13px;border-radius:var(--r4);background:rgba(232,184,75,.08);border:1px solid rgba(232,184,75,.25);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;color:var(--gold);cursor:pointer;transition:all .15s;}
.btn-eod:hover{background:rgba(232,184,75,.18);}
/* NOT-FOUND + EOD modal */
.nf-reason{display:flex;flex-direction:column;gap:8px;margin:12px 0;}
.nf-opt{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);cursor:pointer;font-size:13px;transition:all .15s;}
.nf-opt:hover{border-color:var(--border2);}
.nf-opt.selected{border-color:var(--amber);background:rgba(251,191,36,.08);}
.eod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
.eod-cell{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center;}
.eod-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;margin-bottom:4px;}
.eod-lbl{font-size:9px;color:var(--mist);text-transform:uppercase;letter-spacing:1.5px;}

/* MAIN */
.dash-main{flex:1;padding:18px 16px;max-width:1000px;margin:0 auto;width:100%;}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden;transition:transform .15s;}
.kpi:hover{transform:translateY(-1px);}
.kpi::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0 0 var(--r2) var(--r2);}
.kpi-blue::after{background:linear-gradient(90deg,var(--blue2),var(--blue));}
.kpi-gold::after{background:linear-gradient(90deg,var(--gold2),var(--gold));}
.kpi-green::after{background:linear-gradient(90deg,#059669,var(--green));}
.kpi-red::after{background:linear-gradient(90deg,#dc2626,var(--red));}
.kpi-icon{font-size:18px;margin-bottom:8px;}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--white);margin-bottom:3px;line-height:1;}
.kpi-val.blue{color:var(--blue);}.kpi-val.gold{color:var(--gold);}.kpi-val.green{color:var(--green);}.kpi-val.red{color:var(--red);}
.kpi-lbl{font-size:9px;color:var(--mist);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}

/* ROUTE CARD */
.route-card{background:var(--bg2);border:1px solid rgba(52,211,153,.2);border-radius:var(--r2);padding:14px 16px;margin-bottom:14px;display:none;}
.route-card.visible{display:block;}
.route-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.route-card-title{font-size:14px;font-weight:800;color:var(--green);}
.route-card-sub{font-size:11px;color:var(--mist);margin-top:2px;}
.route-card-actions{display:flex;gap:8px;margin-inline-start:auto;}
.btn-sm{padding:7px 14px;border-radius:var(--r4);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid;}
.btn-green{background:var(--green-faint);border-color:rgba(52,211,153,.25);color:var(--green);}
.btn-green:hover{background:rgba(52,211,153,.2);}
.btn-blue{background:var(--blue-faint);border-color:rgba(74,158,255,.25);color:var(--blue);}
.btn-blue:hover{background:rgba(74,158,255,.2);}
.route-stops{display:flex;flex-direction:column;gap:6px;}
.stop-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);}
.stop-num{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stop-num.done{background:var(--green);}
.stop-info{flex:1;min-width:0;}
.stop-name{font-size:12px;font-weight:700;color:var(--ivory);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stop-addr{font-size:10px;color:var(--mist);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stop-dist{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mist);flex-shrink:0;}
.stop-cash{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0;}
.act-cancel{background:rgba(107,114,128,.08);border-color:rgba(107,114,128,.25);color:#6b7280;}

/* FILTER BAR */
.bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:14px;}
.bar-title{font-size:13px;font-weight:700;color:var(--pearl);flex-shrink:0;}
.s-chip{padding:5px 12px;border-radius:var(--r4);border:1px solid var(--border);background:transparent;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;color:var(--silver);cursor:pointer;transition:all .15s;}
.s-chip:hover{color:var(--ivory);}
.s-chip.active{background:var(--blue-faint);border-color:rgba(74,158,255,.3);color:var(--blue);}
.search-inp{flex:1;min-width:140px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);padding:7px 11px;font-family:'Tajawal',sans-serif;font-size:12px;color:var(--ivory);outline:none;transition:border-color .15s;}
.search-inp::placeholder{color:var(--mist);}
.search-inp:focus{border-color:var(--blue);}
.btn-ref{padding:7px 14px;border-radius:var(--r1);background:var(--blue-faint);border:1px solid rgba(74,158,255,.2);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;color:var(--blue);cursor:pointer;transition:all .15s;}
.btn-ref:hover{background:rgba(74,158,255,.18);}

/* ORDERS */
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;}
.order-card{border-bottom:1px solid var(--border);transition:background .12s;}
.order-card:last-child{border-bottom:none;}
.order-card:hover{background:rgba(255,255,255,.015);}
.order-main{display:grid;grid-template-columns:90px 1fr 100px 80px 120px 110px;align-items:center;gap:0;padding:12px 14px;cursor:pointer;}
.th-row{display:grid;grid-template-columns:90px 1fr 100px 80px 120px 110px;gap:0;background:var(--bg3);border-bottom:1px solid var(--border);padding:9px 14px;}
.th{font-size:9px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:1.5px;}
.o-id{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--gold);}
.o-name{font-size:12px;font-weight:700;color:var(--white);}
.o-phone{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--pearl);margin-top:1px;}
.o-city{font-size:10px;color:var(--mist);margin-top:1px;}
.o-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold);}
.o-ship{font-size:9px;color:var(--mist);margin-top:1px;}
.days-chip{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--r4);border:1px solid;display:inline-flex;align-items:center;}
.dc-ok{background:var(--green-faint);color:var(--green);border-color:rgba(52,211,153,.2);}
.dc-warn{background:var(--amber-faint);color:var(--amber);border-color:rgba(251,191,36,.2);}
.dc-late{background:var(--red-faint);color:var(--red);border-color:rgba(248,113,113,.2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--r4);font-size:9px;font-weight:700;border:1px solid;white-space:nowrap;}
.bd{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.b-ship{color:var(--amber);border-color:rgba(251,191,36,.25);background:var(--amber-faint);}
.b-ship .bd{background:var(--amber);}
.b-done{color:var(--green);border-color:rgba(52,211,153,.25);background:var(--green-faint);}
.b-done .bd{background:var(--green);}
.b-ret{color:var(--red);border-color:rgba(248,113,113,.25);background:var(--red-faint);}
.b-ret .bd{background:var(--red);}
.b-other{color:var(--silver);border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.04);}
.b-other .bd{background:var(--silver);}
.row-acts{display:flex;gap:4px;flex-wrap:wrap;}
.act{padding:4px 9px;border-radius:var(--r4);font-family:'Tajawal',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid;white-space:nowrap;}
.act-dlv{background:var(--green-faint);border-color:rgba(52,211,153,.25);color:var(--green);}
.act-dlv:hover{background:rgba(52,211,153,.2);}
.act-ret{background:var(--red-faint);border-color:rgba(248,113,113,.25);color:var(--red);}
.act-ret:hover{background:rgba(248,113,113,.2);}
.act-partial{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.25);color:var(--amber);}
.act-partial:hover{background:rgba(251,191,36,.18);}
.act-nf{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.25);color:var(--purple);}
.act-nf:hover{background:rgba(167,139,250,.18);}
.act-inv{background:var(--blue-faint);border-color:rgba(74,158,255,.25);color:var(--blue);}
.act-inv:hover{background:rgba(74,158,255,.2);}
.act-map{background:var(--gold-faint);border-color:rgba(232,184,75,.25);color:var(--gold);}
.act-map:hover{background:rgba(232,184,75,.2);}
.order-details{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--bg3);border-top:0px solid var(--border);}
.order-details.open{max-height:200px;border-top:1px solid var(--border);}
.det-inner{padding:14px;}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.det-item label{font-size:9px;color:var(--mist);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;display:block;margin-bottom:3px;}
.det-item span{font-size:12px;color:var(--ivory);}
.empty-state{padding:50px 20px;text-align:center;color:var(--mist);}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.3;}
.empty-text{font-size:14px;font-weight:600;color:var(--silver);}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:9000;pointer-events:none;min-width:240px;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:12px 16px;box-shadow:var(--sh2);display:flex;align-items:center;gap:9px;position:relative;overflow:hidden;}
.toast-box::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;animation:tp 2.5s linear forwards;transform-origin:left;}
.toast-box.ok::after{background:var(--green);}
.toast-box.err::after{background:var(--red);}
@keyframes tp{from{transform:scaleX(1)}to{transform:scaleX(0)}}
.toast-txt{font-size:13px;font-weight:700;color:var(--white);}
.toast-sub{font-size:11px;color:var(--silver);}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:9500;display:none;align-items:center;justify-content:center;padding:20px;}
#modal.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2);animation:fadeUp .25s ease;}
.modal-title{font-size:17px;font-weight:800;color:var(--white);margin-bottom:5px;}
.modal-sub{font-size:11px;color:var(--mist);margin-bottom:18px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.m-btn{flex:1;padding:11px;border-radius:var(--r2);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;border:1px solid;}
.m-ok{background:var(--green-faint);border-color:rgba(52,211,153,.3);color:var(--green);}
.m-ok:hover{background:rgba(52,211,153,.2);}
.m-ret{background:var(--red-faint);border-color:rgba(248,113,113,.3);color:var(--red);}
.m-ret:hover{background:rgba(248,113,113,.2);}
.m-cancel{background:transparent;border-color:var(--border);color:var(--silver);}
.map-frame{width:100%;height:260px;border-radius:var(--r2);border:1px solid var(--border);overflow:hidden;margin-top:12px;}
.map-frame iframe{width:100%;height:100%;border:none;}


/* PHONE BUTTONS */
.phones-wrap{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.phone-row{display:flex;align-items:center;gap:5px;}
.phone-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--pearl);min-width:95px;}
.phone-num.alt{color:var(--mist);}
.ph-btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 8px;border-radius:var(--r4);
  font-family:'Tajawal',sans-serif;font-size:9px;font-weight:700;
  cursor:pointer;text-decoration:none;border:1px solid;
  transition:all .15s;white-space:nowrap;
}
.ph-call{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.25);color:var(--green);}
.ph-call:hover{background:rgba(52,211,153,.2);}
.ph-wa{background:rgba(37,211,102,.08);border-color:rgba(37,211,102,.25);color:#25d366;}
.ph-wa:hover{background:rgba(37,211,102,.2);}

@media(max-width:650px){
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .th-row,.order-main{grid-template-columns:70px 1fr 90px 100px;}
  .th-row>:nth-child(n+4):not(:nth-child(4)),.order-main>:nth-child(n+4):not(:nth-child(4)){display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="page active" id="loginPage">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-logo">WC</div>
      <div class="login-title">بوابة المناديب</div>
      <div class="login-sub">White Clothes Delivery Portal</div>
    </div>
    <div class="login-card">
      <div class="field">
        <label class="field-label">اسم المستخدم</label>
        <input class="field-input" id="li_user" placeholder="اسم المندوب" autocomplete="username"/>
      </div>
      <div class="field">
        <label class="field-label">كلمة السر</label>
        <input class="field-input" id="li_pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">🔐 دخول</button>
      <div class="login-err" id="loginErr">اسم المستخدم أو كلمة السر غلط</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="page" id="dashPage">
  <nav class="dash-nav">
    <div class="dash-nav-inner">
      <div class="nav-brand">WC</div>
      <div class="nav-badge"><div class="nav-dot"></div><span id="navName">—</span></div>
      <div class="nav-gps" id="gpsStatus">
        <div class="gps-dot" id="gpsDot"></div>

/* ══ CITY → COORDS LOOKUP (مصر) ══ */
const CITY_COORDS={
  'القاهرة':[30.0444,31.2357],'الجيزة':[30.0131,31.2089],
  'الإسكندرية':[31.2001,29.9187],'اسكندرية':[31.2001,29.9187],
  'الشرقية':[30.7444,31.8823],'الزقازيق':[30.5877,31.5021],
  'الدقهلية':[31.0364,31.3807],'المنصورة':[31.0409,31.3785],
  'البحيرة':[30.8640,30.5004],'دمنهور':[31.0336,30.4680],
  'المنوفية':[30.5963,30.9876],'شبين الكوم':[30.5639,30.9756],
  'الغربية':[30.8786,31.1683],'طنطا':[30.7865,31.0004],
  'القليوبية':[30.3292,31.2196],'بنها':[30.4667,31.1833],
  'كفر الشيخ':[31.1107,30.9393],'الفيوم':[29.3084,30.8428],
  'بني سويف':[29.0744,31.0994],'المنيا':[28.1099,30.7503],
  'أسيوط':[27.1809,31.1837],'سوهاج':[26.5569,31.6948],
  'قنا':[26.1651,32.7160],'الأقصر':[25.6872,32.6396],
  'أسوان':[24.0889,32.8998],'الإسماعيلية':[30.6043,32.2723],
  'بورسعيد':[31.2653,32.3019],'السويس':[29.9668,32.5498],
  'دمياط':[31.4165,31.8133],'مطروح':[31.3543,27.2373],
  'شمال سيناء':[30.2863,33.6836],'جنوب سيناء':[28.7102,33.9170],
  'البحر الأحمر':[25.6502,34.5589],'الوادي الجديد':[25.4873,30.5580],
};
function cityCoords(city){
  if(!city) return null;
  const c=String(city).trim();
  // exact match
  if(CITY_COORDS[c]) return CITY_COORDS[c];
  // partial match
  for(const [k,v] of Object.entries(CITY_COORDS)){
    if(c.includes(k)||k.includes(c)) return v;
  }
  return null;
}

/* ══ HAVERSINE ══ */
function distKm(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ══ ROUTE — مرتب بالأقرب، يفتح modal ══ */
function buildSortedRoute(){
  const shipped=myOrders.filter(r=>r.status==='تم الشحن');
  if(!shipped.length) return [];

  // أضف إحداثيات تقريبية من اسم المدينة
  const withCoords = shipped.map(r=>({
    ...r,
    _coords: cityCoords(r.city)
  }));

  // لو مفيش GPS — رتّب بالمدينة (نفس المحافظة مع بعض)
  if(!myPos){
    return [...withCoords].sort((a,b)=>{
      const ca=a.city||'', cb=b.city||'';
      return ca.localeCompare(cb,'ar');
    });
  }

  // Nearest Neighbor Greedy من موقع المندوب
  let remaining=[...withCoords];
  let sorted=[];
  let current=[myPos.lat, myPos.lng];

  while(remaining.length){
    let nearest=remaining[0], minD=Infinity;
    remaining.forEach(r=>{
      const coords=r._coords;
      if(coords){
        const d=distKm(current[0],current[1],coords[0],coords[1]);
        if(d<minD){minD=d;nearest=r;}
      }
    });
    const dist = nearest._coords
      ? Math.round(distKm(current[0],current[1],nearest._coords[0],nearest._coords[1])*10)/10
      : null;
    sorted.push({...nearest, _dist: dist});
    current = nearest._coords || current;
    remaining = remaining.filter(r=>(r.orderId||r.id)!==(nearest.orderId||nearest.id));
  }
  return sorted;
}

}

/* ══ HISTORY — تاريخ أداء المندوب اليومي ══ */
function renderHistory(){
  const wrap = document.getElementById('ordersList');

  // جمع البيانات اليومية
  const dayMap = {}; // 'YYYY-MM-DD' → { delivered, returned, retPartial, cash, orders[] }

  myOrders.forEach(r=>{
    const status = String(r.status||'').trim();
    let dateKey = null;

    if(status === 'تم التسليم'){
      dateKey = String(r.deliveryDate||r.shipDate||'').replace(/\//g,'-').slice(0,10);
    } else if(status === 'مرتجع' || status === 'مرتجع جزئي'){
      dateKey = String(r.deliveryDate||r.shipDate||r.returnDate||'').replace(/\//g,'-').slice(0,10);
    }

    if(!dateKey || dateKey.length < 8) return;

    if(!dayMap[dateKey]) dayMap[dateKey] = {delivered:0, returned:0, retPartial:0, cash:0, orders:[]};
    const day = dayMap[dateKey];

    if(status === 'تم التسليم'){
      day.delivered++;
      day.cash += n(r.subtotal||r.productTotal||0) - n(r.partialReturn||0);
    } else if(status === 'مرتجع'){
      day.returned++;
    } else if(status === 'مرتجع جزئي'){
      day.retPartial++;
      day.cash += n(r.partialReturn||0) * -1; // خصم
    }
    day.orders.push(r);
  });

  const days = Object.entries(dayMap).sort((a,b)=>b[0].localeCompare(a[0]));

  if(!days.length){
    wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">لا يوجد سجل بعد</div></div>`;
    return;
  }

  // حساب الإجماليات
  let totalDlv=0, totalRet=0, totalCash=0;
  days.forEach(([,d])=>{ totalDlv+=d.delivered; totalRet+=d.returned+d.retPartial; totalCash+=d.cash; });

  // ── إجمالي في الأعلى ──
  const summaryHtml = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px;background:var(--bg3);border-bottom:1px solid var(--border);">
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--green);">${totalDlv}</div>
        <div style="font-size:9px;color:var(--mist);text-transform:uppercase;letter-spacing:1px;margin-top:3px;">إجمالي تسليم</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--red);">${totalRet}</div>
        <div style="font-size:9px;color:var(--mist);text-transform:uppercase;letter-spacing:1px;margin-top:3px;">إجمالي مرتجع</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--gold);">${fmt(totalCash)}</div>
        <div style="font-size:9px;color:var(--mist);text-transform:uppercase;letter-spacing:1px;margin-top:3px;">إجمالي تحصيل ج</div>
      </div>
    </div>`;

  // ── صفوف الأيام ──
  const daysHtml = days.map(([dateKey, d])=>{
    const total = d.delivered + d.returned + d.retPartial;
    const rate  = total > 0 ? Math.round(d.delivered/total*100) : 0;
    const retTotal = d.returned + d.retPartial;

    // تنسيق التاريخ
    let dateLabel = dateKey;
    try{
      const dt = new Date(dateKey);
      dateLabel = dt.toLocaleDateString('ar-EG',{weekday:'short',day:'numeric',month:'short'});
      if(isToday(dateKey)) dateLabel = '🟢 اليوم';
    }catch{}

    const rateColor = rate>=80?'var(--green)':rate>=50?'var(--amber)':'var(--red)';

    return `<div style="
        border-bottom:1px solid var(--border);
        padding:14px;
        transition:background .12s;
        cursor:default;
      " onmouseover="this.style.background='rgba(255,255,255,.015)'" onmouseout="this.style.background=''">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:var(--white);">${dateLabel}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;
          border-radius:var(--r4);border:1px solid ${rateColor}40;background:${rateColor}12;
          color:${rateColor};font-weight:700;">${rate}% تسليم</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;">
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);padding:10px;text-align:center;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--green);">${d.delivered}</div>
          <div style="font-size:9px;color:var(--mist);margin-top:2px;">✅ سُلِّم</div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);padding:10px;text-align:center;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--red);">${retTotal}</div>
          <div style="font-size:9px;color:var(--mist);margin-top:2px;">↩️ مرتجع${d.retPartial?` (${d.retPartial} جزئي)`:''}</div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);padding:10px;text-align:center;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--gold);">${fmt(d.cash)}</div>
          <div style="font-size:9px;color:var(--mist);margin-top:2px;">💰 تحصيل ج</div>
        </div>
      </div>
      ${total>0?`<div style="background:var(--bg4);border-radius:var(--r4);height:4px;overflow:hidden;">
        <div style="height:100%;border-radius:var(--r4);background:linear-gradient(90deg,${rateColor}80,${rateColor});width:${rate}%;transition:width .5s;"></div>
      </div>`:''}
    </div>`;
  }).join('');

  wrap.innerHTML = summaryHtml + daysHtml;
}

/* ══ RENDER ORDERS ══ */
function renderOrders(){
  if(filterMode==='history'){ renderHistory(); return; }
  const q=(document.getElementById('searchInp')?.value||'').trim().toLowerCase();
  let list=myOrders.filter(r=>{
    const status=String(r.status||'').trim();
    if(filterMode==='shipped' && !['تم الشحن','محاولة توصيل'].includes(status)) return false;
    if(filterMode==='today' && !(status==='تم التسليم'&&isToday(r.deliveryDate||r.shipDate))) return false;
    if(filterMode==='returned' && !['مرتجع','مرتجع جزئي'].includes(status)) return false;

    if(q){const h=[r.orderId||r.id,r.name||r.customer,r.phone||r.phone1,r.city].join('|').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  // ترتيب: المتأخر أول
  list.sort((a,b)=>(daysSince(b.shipDate)??0)-(daysSince(a.shipDate)??0));

  const wrap=document.getElementById('ordersList');
  if(!list.length){
    wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">لا يوجد شحنات هنا</div></div>`;
    return;
  }

  const badgeMap={
    'تم الشحن':`<span class="badge b-ship"><span class="bd"></span>في الطريق</span>`,
    'تم التسليم':`<span class="badge b-done"><span class="bd"></span>مُسلَّم</span>`,
    'مرتجع':`<span class="badge b-ret"><span class="bd"></span>مرتجع</span>`,
    'مرتجع جزئي':`<span class="badge b-ret"><span class="bd"></span>جزئي</span>`,
    'محاولة توصيل':`<span class="badge" style="color:var(--purple);border-color:rgba(167,139,250,.2);background:rgba(167,139,250,.08);"><span class="bd" style="background:var(--purple);"></span>محاولة</span>`,
  };

  wrap.innerHTML=list.map(r=>{
    const id=String(r.orderId||r.id||'');
    const subtotal=n(r.subtotal||r.productTotal||0)-n(r.partialReturn||0);
    const status=String(r.status||'').trim();
    const days=daysSince(r.shipDate);
    const daysHtml=days!=null?`<span class="days-chip ${days>=10?'dc-late':days>=6?'dc-warn':'dc-ok'}">${days} يوم</span>`:'-';
    const badge=badgeMap[status]||`<span class="badge b-other"><span class="bd"></span>${esc(status||'—')}</span>`;
    const isOpen=expandedId===id;

    let acts='';
    if(status==='تم الشحن'||status==='محاولة توصيل'){
      acts+=`<button class="act act-dlv" onclick="confirmDeliver('${esc(id)}',event)">📦 تسليم</button>`;
      acts+=`<button class="act act-ret" onclick="confirmReturn('${esc(id)}',event)">↩️ كامل</button>`;
      acts+=`<button class="act act-partial" onclick="confirmPartialReturn('${esc(id)}',event)">↩️ جزئي</button>`;
      acts+=`<button class="act act-nf" onclick="confirmNotFound('${esc(id)}',event)">🚫 مش لاقيه</button>`;
      acts+=`<button class="act act-cancel" onclick="confirmCancel('${esc(id)}',event)">❌ إلغاء</button>`;
    }
    acts+=`<button class="act act-inv" onclick="printInv('${esc(id)}',event)">🧾</button>`;
    acts+=`<button class="act act-map" onclick="showMap('${esc(id)}',event)">📍</button>`;

    return`<div class="order-card" id="oc_${esc(id)}">
      <div class="order-main" onclick="toggleExpand('${esc(id)}')">
        <div class="o-id">${esc(id)}</div>

          <div class="o-name">${esc(r.name||r.customer||'')}</div>
          <div class="phones-wrap" onclick="event.stopPropagation()">
            ${phoneRowsHtml([
              {num:r.phone||r.phone1||''},
              {num:r.phone2||r.altPhone||''}

          </div>

        <div>
          <div class="o-amt">${fmt(subtotal)} ج</div>
          <div class="o-ship">شحن: ${fmt(r.shipping||0)} ج</div>
        </div>
        <div>${daysHtml}</div>
        <div>${badge}</div>
        <div class="row-acts" onclick="event.stopPropagation()">${acts}</div>
      </div>
      <div class="order-details${isOpen?' open':''}" id="od_${esc(id)}">

/* ══ PARTIAL RETURN ══ */
function confirmPartialReturn(id,e){
  e.stopPropagation();
  const r=myOrders.find(x=>String(x.orderId||x.id||'')===id);
  if(!r){toast('مش لاقي الأوردر','','err');return;}

  // parse products from the order
  let items=[];
  try{
    const raw=r.products||r.items||'';
    if(typeof raw==='string'&&raw.trim()){
      // format: "name|qty|price,name|qty|price" OR JSON
      if(raw.startsWith('[')){
        items=JSON.parse(raw);
      }else{
        items=raw.split(/[,\n]/).filter(Boolean).map(p=>{
          const parts=p.split('|');
          return{name:(parts[0]||'').trim(),qty:Number(parts[1]||1),price:Number(parts[2]||0)};
        });
      }
    }
  }catch{}

  const totalAmount=n(r.subtotal||r.productTotal||0);

  // If no products parsed, fall back to manual amount entry
  if(!items.length){
    openModal(`
      <div class="modal-title">↩️ مرتجع جزئي</div>
      <div class="modal-sub">Order: <b style="color:var(--gold)">${esc(id)}</b> — ${esc(r.name||r.customer||'')}</div>
      <div style="background:var(--amber-faint);border:1px solid rgba(251,191,36,.2);
        border-radius:var(--r1);padding:12px;font-size:12px;color:var(--amber);margin-bottom:14px;">
        ⚠️ مفيش تفاصيل منتجات — هتدخل مبلغ المرتجع يدوياً
      </div>
      <div>
        <label style="font-size:10px;color:var(--mist);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;display:block;margin-bottom:7px;">
          مبلغ المرتجع (ج)
        </label>
        <input type="number" id="partAmt" min="1" max="${totalAmount}" value=""
          placeholder="مثال: 150"
          style="width:100%;background:var(--bg3);border:1px solid var(--border2);
            border-radius:var(--r1);padding:10px 12px;color:var(--white);
            font-family:'JetBrains Mono',monospace;font-size:16px;outline:none;"/>
        <div style="font-size:10px;color:var(--mist);margin-top:5px;">
          إجمالي الأوردر: <b style="color:var(--gold);">${fmt(totalAmount)} ج</b>
        </div>
      </div>
      <div class="modal-actions">
        <button class="m-btn" style="background:var(--amber-faint);border-color:rgba(251,191,36,.3);color:var(--amber);"
          onclick="_doPartialManual('${esc(id)}')">↩️ تأكيد المرتجع الجزئي</button>
        <button class="m-btn m-cancel" onclick="closeModal()">إلغاء</button>
      </div>
    `);
    return;
  }

  // Show product checkboxes
  const prodRows=items.map((item,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;
      background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);margin-bottom:6px;
      cursor:pointer;" onclick="toggleProd(${i})" id="prodRow_${i}">
      <div style="width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);
        background:transparent;display:flex;align-items:center;justify-content:center;
        flex-shrink:0;transition:all .15s;" id="prodChk_${i}"></div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:var(--ivory);">${esc(item.name||'منتج '+(i+1))}</div>
        <div style="font-size:10px;color:var(--mist);">كمية: ${item.qty||1} · سعر: ${fmt(item.price||0)} ج</div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold);">
        ${fmt((item.price||0)*(item.qty||1))} ج
      </div>
    </div>
  `).join('');

  openModal(`
    <div class="modal-title">↩️ مرتجع جزئي</div>
    <div class="modal-sub">Order: <b style="color:var(--gold)">${esc(id)}</b> — ${esc(r.name||r.customer||'')}
      · إجمالي: <b style="color:var(--gold);">${fmt(totalAmount)} ج</b>
    </div>
    <div style="font-size:11px;color:var(--mist);margin-bottom:10px;">اختر المنتجات اللي رجعت:</div>
    <div id="prodList">${prodRows}</div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);
      padding:10px 14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;color:var(--mist);">مبلغ المرتجع:</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--red);" id="partTotal">0 ج</span>
    </div>
    <div class="modal-actions">
      <button class="m-btn" style="background:var(--amber-faint);border-color:rgba(251,191,36,.3);color:var(--amber);"
        onclick="_doPartialProducts('${esc(id)}',${JSON.stringify(items).replace(/'/g,'\\\'')})">↩️ تأكيد المرتجع الجزئي</button>
      <button class="m-btn m-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  `);

  // init selection state
  window._partialSelected=new Set();
  window._partialItems=items;
}

// toggle product checkbox in modal
function toggleProd(i){
  const sel=window._partialSelected;
  const items=window._partialItems;
  if(sel.has(i)) sel.delete(i); else sel.add(i);

  // update checkbox UI
  const chk=document.getElementById('prodChk_'+i);
  const row=document.getElementById('prodRow_'+i);
  if(chk){
    chk.style.background=sel.has(i)?'var(--amber)':'transparent';
    chk.style.borderColor=sel.has(i)?'var(--amber)':'var(--border2)';
    chk.innerHTML=sel.has(i)?'<span style="color:#000;font-size:11px;font-weight:900;">✓</span>':'';
  }
  if(row) row.style.borderColor=sel.has(i)?'rgba(251,191,36,.3)':'var(--border)';

  // update total
  let total=0;
  sel.forEach(idx=>{ total+=(items[idx]?.price||0)*(items[idx]?.qty||1); });
  const el=document.getElementById('partTotal');
  if(el) el.textContent=fmt(total)+' ج';
}

async function _doPartialProducts(id, items){
  const sel=window._partialSelected;
  if(!sel||!sel.size){toast('اختر منتج واحد على الأقل','','err');return;}

  let total=0;
  const selectedItems=[];
  sel.forEach(i=>{
    const item=items[i];
    if(item){ total+=(item.price||0)*(item.qty||1); selectedItems.push(item); }
  });

  if(!total){toast('المبلغ صفر','','err');return;}
  closeModal();
  await _submitPartialReturn(id, total, selectedItems);
}

async function _doPartialManual(id){
  const amt=Number(document.getElementById('partAmt')?.value||0);
  if(!amt||amt<=0){toast('ادخل مبلغ صحيح','','err');return;}
  closeModal();
  await _submitPartialReturn(id, amt, []);
}

async function _submitPartialReturn(id, amount, selectedItems){
  toast('جاري التسجيل…');
  try{
    // 1) حدّث الحالة لـ "مرتجع جزئي" مع المبلغ
    const res=await api('bulkUpdate',{
      ids:id,
      status:'مرتجع جزئي',
      courier:'',shipDate:'',deliveryDate:'',
      partialAmount: amount
    });
    if(!res?.ok){toast('فشل التحديث',res?.error||'','err');return;}

    // 2) لو عندنا تفاصيل منتجات، رجّع للمخزن
    if(selectedItems.length){
      await api('partialReturn',{
        orderId: id,
        items: JSON.stringify(selectedItems)
      }).catch(()=>{});
    }

    // 3) حدّث الـ local cache
    myOrders=myOrders.map(r=>{
      if(String(r.orderId||r.id||'')!==id) return r;
      return{...r, status:'مرتجع جزئي', partialReturn:amount};
    });
    updateKPIs();updateRoute();renderOrders();
    toast(`✅ مرتجع جزئي ${fmt(amount)} ج`,'','ok');
  }catch{toast('خطأ في الاتصال','','err');}
}

/* ══ NOT FOUND ══ */
function confirmNotFound(id, e){
  e.stopPropagation();
  const r = myOrders.find(x=>String(x.orderId||x.id||'')===id);
  if(!r) return;
  const phones = [r.phone||r.phone1||'', r.phone2||r.altPhone||''].filter(Boolean);
  const firstName = (r.name||r.customer||'').split(' ')[0];
  const amount = n(r.subtotal||r.productTotal||0) + n(r.shipping||0) - n(r.partialReturn||0);

  let _selectedReason = '';
  const reasons = [
    {id:'no_answer', label:'📵 مش رادّ'},
    {id:'postponed', label:'📅 طلب تأجيل'},
    {id:'wrong_addr', label:'📍 عنوان غلط'},
    {id:'refused',   label:'🚫 رفض الاستلام'},
  ];

  const reasonsHtml = reasons.map(r2=>`
    <div class="nf-opt" id="nfr_${r2.id}" onclick="selectNFReason('${r2.id}')">
      ${r2.label}
    </div>`).join('');

  // واتساب للعميل يبلغه
  const waNum = phones.length ? toWaNum(phones[0]) : '';
  const waMsg = encodeURIComponent(
    `مرحباً ${firstName}، حاولنا نوصّلك طلبك ومش لاقيناك 🚗\nهنكلمك تاني لتحديد موعد مناسب`
  );

  openModal(`
    <div class="modal-title">🚫 مش لاقي العميل</div>
    <div class="modal-sub">Order: <b style="color:var(--gold)">${esc(id)}</b> — ${esc(r.name||r.customer||'')}</div>
    <div style="font-size:11px;color:var(--mist);margin-bottom:10px;">اختر سبب عدم التسليم:</div>
    <div class="nf-reason" id="nfReasons">${reasonsHtml}</div>
    ${waNum?`
    <div style="margin-top:10px;">
      <a href="https://wa.me/${waNum}?text=${waMsg}" target="_blank"
        style="display:flex;align-items:center;justify-content:center;gap:8px;
          padding:11px;background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.25);
          border-radius:var(--r2);color:#25d366;font-weight:700;font-size:13px;text-decoration:none;">
        💬 إبلاغ العميل على واتساب
      </a>
    </div>`:''}
    <div class="modal-actions">
      <button class="m-btn" style="background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:var(--purple);"
        onclick="_submitNotFound('${esc(id)}')">🚫 تسجيل المحاولة</button>
      <button class="m-btn m-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  `);
  window._nfReason = '';
}

function selectNFReason(id){
  window._nfReason = id;
  document.querySelectorAll('.nf-opt').forEach(el=>{
    el.classList.toggle('selected', el.id==='nfr_'+id);
  });
}

async function _submitNotFound(id){
  closeModal();
  toast('جاري التسجيل…');
  try{
    // نضيف ملاحظة في الـ note field بدل ما نغير الستاتوس
    const reason = window._nfReason || 'no_answer';
    const reasonLabels = {no_answer:'مش رادّ',postponed:'طلب تأجيل',wrong_addr:'عنوان غلط',refused:'رفض الاستلام'};
    const note = `محاولة توصيل فاشلة — ${reasonLabels[reason]||reason} — ${new Date().toLocaleString('ar-EG')}`;
    const res = await api('bulkUpdate',{
  ids: id,
  status: 'محاولة توصيل',
  Shippingnotes: note,    // ← اسم العمود بالظبط
  courier:'', shipDate:'', deliveryDate:'', partialAmount:''
  // امسح السطر التاني خالص
});
    if(res?.ok){
      // حدّث محلياً
      myOrders = myOrders.map(r2 =>
        String(r2.orderId||r2.id||'') === id
          ? {...r2, status:'محاولة توصيل', note}
          : r2
      );
      updateKPIs(); renderOrders();
      toast('✅ تم تسجيل المحاولة','','ok');
    } else {
      toast('❌ فشل التسجيل — تأكد من الاتصال','','err');
    }
  }catch{toast('تم تسجيل المحاولة محلياً','','ok');}
}

function confirmCancel(id, e){
  e.stopPropagation();
  const r = myOrders.find(x=>String(x.orderId||x.id||'')===id);
  if(!r) return;
  openModal(`
    <div class="modal-title">❌ إلغاء الأوردر</div>
    <div class="modal-sub">Order: <b style="color:var(--gold)">${esc(id)}</b> — ${esc(r.name||r.customer||'')}</div>
    <div style="padding:12px;background:rgba(107,114,128,.08);border:1px solid rgba(107,114,128,.2);border-radius:var(--r1);font-size:12px;color:#9ca3af;margin:12px 0;">
      ⚠️ هيتسجل كـ "الغاء" في الشيت
    </div>
    <div class="modal-actions">
      <button class="m-btn" style="background:rgba(107,114,128,.1);border-color:rgba(107,114,128,.3);color:#9ca3af;"
        onclick="_doCancel('${esc(id)}')">❌ تأكيد الإلغاء</button>
      <button class="m-btn m-cancel" onclick="closeModal()">رجوع</button>
    </div>
  `);
}

async function _doCancel(id){
  closeModal();
  const res = await api('bulkUpdate',{
    ids:id, status:'الغاء', courier:'', shipDate:'', deliveryDate:'', partialAmount:''
  });
  if(res?.ok){
    myOrders = myOrders.map(r => String(r.orderId||r.id||'')===id ? {...r,status:'الغاء'} : r);
    updateKPIs(); renderOrders();
    toast('✅ تم الإلغاء');
  } else toast('❌ فشل — تأكد من الاتصال','','err');
}

/* ══ END OF DAY REPORT ══ */
function showEndOfDay(){
  const today = new Date().toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long'});
  const todayKey = new Date().toISOString().slice(0,10);

  const delivered = myOrders.filter(r=>r.status==='تم التسليم');
  const todayDlv  = delivered.filter(r=>isToday(r.deliveryDate||r.shipDate));
  const returned  = myOrders.filter(r=>['مرتجع','مرتجع جزئي'].includes(r.status));
  const todayRet  = returned.filter(r=>isToday(r.deliveryDate||r.shipDate||r.returnDate));
  const inRoute   = myOrders.filter(r=>r.status==='تم الشحن');

  const cash = todayDlv.reduce((a,r)=>a+n(r.subtotal||r.productTotal||0)-n(r.partialReturn||0),0);
  const totalToday = todayDlv.length + todayRet.length;
  const rate = totalToday>0 ? Math.round(todayDlv.length/totalToday*100) : 0;
  const rateColor = rate>=80?'var(--green)':rate>=50?'var(--amber)':'var(--red)';

  // بناء رسالة واتساب للمدير
  const waReport = encodeURIComponent(
    `📊 تقرير يوم ${today}\n` +
    `المندوب: ${courier.name}\n` +
    `━━━━━━━━━━━━━━━\n` +
    `✅ تسليم اليوم: ${todayDlv.length} أوردر\n` +
    `↩️ مرتجع اليوم: ${todayRet.length} أوردر\n` +
    `🚚 متبقي في الطريق: ${inRoute.length} أوردر\n` +
    `💰 إجمالي التحصيل: ${fmt(cash)} ج\n` +
    `📈 نسبة التسليم: ${rate}%`
  );

  openModal(`
    <div class="modal-title">📊 تقرير نهاية اليوم</div>
    <div class="modal-sub" style="color:var(--gold);">${today} · ${courier.name}</div>

    <div class="eod-grid">
      <div class="eod-cell">
        <div class="eod-val" style="color:var(--green);">${todayDlv.length}</div>
        <div class="eod-lbl">✅ سُلِّم</div>
      </div>
      <div class="eod-cell">
        <div class="eod-val" style="color:var(--red);">${todayRet.length}</div>
        <div class="eod-lbl">↩️ مرتجع</div>
      </div>
      <div class="eod-cell">
        <div class="eod-val" style="color:var(--amber);">${inRoute.length}</div>
        <div class="eod-lbl">🚚 متبقي</div>
      </div>
    </div>

    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:12px;color:var(--mist);">إجمالي التحصيل</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--gold);">${fmt(cash)} ج</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:12px;color:var(--mist);">نسبة التسليم</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${rateColor};">${rate}%</span>
      </div>
      <div style="background:var(--bg4);border-radius:var(--r4);height:6px;overflow:hidden;">
        <div style="height:100%;border-radius:var(--r4);background:linear-gradient(90deg,${rateColor}80,${rateColor});width:${rate}%;transition:width .6s;"></div>
      </div>
    </div>

    ${MANAGER_PHONE && MANAGER_PHONE !== '201XXXXXXXXX' ? `
    <a href="https://wa.me/${MANAGER_PHONE}?text=${waReport}" target="_blank"
      style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;
        padding:12px;background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.25);
        border-radius:var(--r2);color:#25d366;font-weight:800;font-size:14px;text-decoration:none;">
      💬 إرسال التقرير للمدير
    </a>` : `
    <div style="padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r1);
      font-size:11px;color:var(--mist);margin-bottom:10px;text-align:center;">
      💡 أضف رقم المدير في MANAGER_PHONE لإرسال التقرير تلقائياً
    </div>`}

    <button class="m-btn m-cancel" onclick="closeModal()" style="width:100%;">إغلاق</button>
  `);
}

/* ══ PRINT / MAP ══ */
function printInv(id,e){e.stopPropagation();const w=window.open(PRINT_URL+'?action=print80&orderId='+encodeURIComponent(id)+'&v='+Date.now(),'_blank');if(!w)toast('اسمح بـ Pop-up','','err');}

function showMap(id,e){
  e.stopPropagation();
  const r=myOrders.find(x=>String(x.orderId||x.id||'')===id);
  if(!r)return;
  const addrClean=[r.address,r.city,'مصر'].filter(Boolean).join(', ');
  const addrEnc=encodeURIComponent(addrClean);
  const searchUrl=`https://www.google.com/maps/search/${addrEnc}`;
  const dirUrl=myPos
    ? `https://www.google.com/maps/dir/${myPos.lat},${myPos.lng}/${addrEnc}`
    : searchUrl;
  openModal(`
    <div class="modal-title">📍 موقع العميل</div>
    <div class="modal-sub">${esc(r.name||r.customer||'')} — ${esc(r.city||'')} / ${esc(r.address||'')}</div>
    <div class="map-frame"><iframe src="https://maps.google.com/maps?q=${addrEnc}&output=embed" allowfullscreen loading="lazy"></iframe></div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <a href="${searchUrl}" target="_blank" style="flex:1;padding:10px;background:var(--green-faint);border:1px solid rgba(52,211,153,.2);border-radius:var(--r1);color:var(--green);font-weight:700;font-size:12px;text-align:center;text-decoration:none;">🗺️ فتح Google Maps</a>
      ${myPos?`<a href="${dirUrl}" target="_blank" style="flex:1;padding:10px;background:var(--blue-faint);border:1px solid rgba(74,158,255,.2);border-radius:var(--r1);color:var(--blue);font-weight:700;font-size:12px;text-align:center;text-decoration:none;">🚗 توجيه من موقعي</a>`:''}
      <button class="m-btn m-cancel" style="flex:0.5;" onclick="closeModal()">✕</button>
    </div>
  `);
}

function buildAddrStr(r){return[r.address,r.city].filter(Boolean).join(', ');}
